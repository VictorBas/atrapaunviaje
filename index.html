<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Atrapa un Viaje</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="index">

  <header class="header">
    <h1>Atrapa un Viaje ✈️</h1>
    <p>Vuelos baratos y escapadas inolvidables</p>
  </header>

  <main>
    <section class="hero">
      <div class="hero-grid-3cols">

        <!-- BUSCADOR -->
        <div class="buscador">
          <h2>Busca tu vuelo ideal 🌍</h2>

          <button id="btn-toggle-vuelo" class="btn" style="margin-bottom:10px;">
            Modo: Ida y vuelta
          </button>

          <div class="search-bar">

            <input type="text" id="origen" placeholder="Código IATA origen (ej: MAD)">
            <input type="text" id="destino" placeholder="Código IATA destino (ej: ROM)">

            <input type="date" id="fecha-ida" placeholder="Fecha ida">
            <input type="date" id="fecha-vuelta" placeholder="Fecha vuelta">


            <button class="btn" id="btn-buscar">Buscar vuelos</button>
          </div>
        </div>

        <!-- OFERTAS -->
        <div class="ofertas-hero">
          <div style="display:flex; justify-content: space-between; margin-bottom:15px;">
            <h2>Ofertas seleccionadas ✨</h2>
            <button id="btn-fav-toggle" class="btn" style="width:auto;">Mostrar favoritos</button>
          </div>

          <div class="cards-hero" id="cards-hero"></div>
        </div>

        <!-- MINI BUSCADOR -->
        <div class="mini-buscador">
          <h3>Filtra tus destinos favoritos 🔎</h3>

          <div class="search-bar-interactivo">
            <input type="text" id="mini-destino" placeholder="Destino (ej: París)">
            <input type="number" id="mini-dias" placeholder="Duración (días)">
            <button class="btn" onclick="buscarMini()">Buscar</button>
          </div>

          <div id="resultados-mini" class="cards-hero"></div>
        </div>

      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Atrapa un Viaje</p>
  </footer>

  <script>
    let destinos = [];
    let soloIda = false;

    // =============================
    // CARGAR DATOS
    // =============================
    fetch('destinos.json')
      .then(res => res.json())
      .then(data => {
        destinos = data;
        mostrarOfertas(destinos);
      });

    // =============================
    // TOGGLE IDA / VUELTA
    // =============================
    document.getElementById('btn-toggle-vuelo').addEventListener('click', () => {
      soloIda = !soloIda;

      document.getElementById('fecha-vuelta').style.display = soloIda ? 'none' : 'block';

      document.getElementById('btn-toggle-vuelo').textContent =
        soloIda ? 'Modo: Solo ida' : 'Modo: Ida y vuelta';
    });


    // =============================
    // FECHAS (FUNCIONA EN iOS + PC)
    // =============================
    const fechaIda = document.getElementById('fecha-ida');
    const fechaVuelta = document.getElementById('fecha-vuelta');

    const fechaIdaText = document.getElementById('fecha-ida-text');
    const fechaVueltaText = document.getElementById('fecha-vuelta-text');

    fechaIda.addEventListener('change', () => {
      fechaIdaText.textContent = formatearFecha(fechaIda.value);
    });

    fechaVuelta.addEventListener('change', () => {
      fechaVueltaText.textContent = formatearFecha(fechaVuelta.value);
    });

    function formatearFecha(fecha) {
      const f = new Date(fecha);
      return f.toLocaleDateString('es-ES', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      });
    }

    // =============================
    // BUSCAR SKYSCANNER
    // =============================
    document.getElementById('btn-buscar').addEventListener('click', () => {
      const origen = document.getElementById('origen').value.toUpperCase();
      const destino = document.getElementById('destino').value.toUpperCase();
      let fechaIda = document.getElementById('fecha-ida').value;
      let fechaVuelta = document.getElementById('fecha-vuelta').value;

      if (!origen || !destino || !fechaIda || (!soloIda && !fechaVuelta)) {
        alert('Rellena todos los campos');
        return;
      }

      // Formato YYYYMMDD
      fechaIda = fechaIda.replace(/-/g, '');
      if (fechaVuelta) fechaVuelta = fechaVuelta.replace(/-/g, '');

      let url = `https://www.skyscanner.es/transport/flights/${origen}/${destino}/${fechaIda}/`;
      if (!soloIda && fechaVuelta) url += `${fechaVuelta}/`;

      window.open(url, '_blank');
    });


    // =============================
    // CARDS
    // =============================
    function generarCard(d) {
      return `
        <div class="card">
          <h3>${d.nombre}</h3>
          <p><strong>${d.dias} días</strong></p>
          <p>📅 ${d.fechas}</p>
          <p>✈️ ${d.vuelo}€</p>
          <p>🏨 ${d.hotel}</p>

          <img class="favorito" 
               src="https://images.vexels.com/media/users/3/136916/isolated/lists/aa21eb60437133bf4f4be189636a187a-icono-de-contorno-favorito-de-estrella.png"
               data-fav="false"
               style="width:25px; cursor:pointer;">

          <button class="btn" onclick="window.location='destino.html?slug=${d.slug}'">
            Ver detalles
          </button>
        </div>
      `;
    }

    function mostrarOfertas(lista) {
      const container = document.getElementById('cards-hero');

      if (lista.length === 0) {
        container.innerHTML = "<p>No se encontraron resultados 😔</p>";
        return;
      }

      container.innerHTML = lista.map(d => generarCard(d)).join('');
      activarFavoritos();
    }

    // =============================
    // FAVORITOS (ARREGLADO)
    // =============================
    function activarFavoritos() {
      const favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];

      document.querySelectorAll('.favorito').forEach(star => {
        const card = star.closest('.card');
        const slug = card.querySelector('button').getAttribute('onclick').match(/slug=([^']+)/)[1];

        if (favoritos.includes(slug)) {
          star.src = "https://images.icon-icons.com/1527/PNG/512/star_106651.png";
          star.dataset.fav = "true";
        }

        star.onclick = () => {
          let favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];

          if (star.dataset.fav === "true") {
            star.src = "https://images.vexels.com/media/users/3/136916/isolated/lists/aa21eb60437133bf4f4be189636a187a-icono-de-contorno-favorito-de-estrella.png";
            star.dataset.fav = "false";
            favoritos = favoritos.filter(f => f !== slug);
          } else {
            star.src = "https://images.icon-icons.com/1527/PNG/512/star_106651.png";
            star.dataset.fav = "true";
            if (!favoritos.includes(slug)) favoritos.push(slug);
          }

          localStorage.setItem('favoritos', JSON.stringify(favoritos));
        }
      });
    }

    // =============================
    // BOTÓN FAVORITOS
    // =============================
    let mostrandoFavoritos = false;

    document.getElementById('btn-fav-toggle').addEventListener('click', () => {
      mostrandoFavoritos = !mostrandoFavoritos;

      const favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];

      if (mostrandoFavoritos) {
        mostrarOfertas(destinos.filter(d => favoritos.includes(d.slug)));
        btn - fav - toggle.textContent == "Mostrar todos";
      } else {
        mostrarOfertas(destinos);
        btn - fav - toggle.textContent == "Mostrar favoritos";
      }
    });

    // =============================
    // MINI BUSCADOR
    // =============================
    function buscarMini() {
      const destinoVal = document.getElementById('mini-destino').value.toLowerCase();
      const diasVal = parseInt(document.getElementById('mini-dias').value);

      const resultados = destinos.filter(d =>
        d.nombre.toLowerCase().includes(destinoVal) &&
        (!diasVal || d.dias == diasVal)
      );

      const container = document.getElementById('resultados-mini');

      if (resultados.length === 0) {
        container.innerHTML = "<p>No se encontraron resultados 😔</p>";
        return;
      }

      container.innerHTML = resultados.map(d => generarCard(d)).join('');
      activarFavoritos();
    }
  </script>

</body>

</html>
