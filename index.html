<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Atrapa un Viaje</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="index">
  <header class="header">
    <h1>Atrapa un Viaje ✈️</h1>
    <p>Vuelos baratos y escapadas inolvidables</p>
  </header>
  <main>
    <section class="hero">
      <div class="hero-grid-3cols">
        <div class="buscador">
          <h2>Busca tu vuelo ideal 🌍</h2>
          <button id="btn-toggle-vuelo" class="btn" style="margin-bottom:10px;">Modo: Ida y vuelta</button>
          <div class="search-bar">
            <input type="text" id="origen" placeholder="Código IATA origen (ej: MAD)">
            <input type="text" id="destino" placeholder="Código IATA destino (ej: ROM)">
            <div class="campo-fecha">
              <p>Fecha ida</p>
              <input type="date" id="fecha-ida">
            </div>
            <div class="campo-fecha">
              <p id="fecha-vuelta-p">Fecha vuelta</p>
              <input type="date" id="fecha-vuelta">
            </div>
            <button class="btn" id="btn-buscar">Buscar vuelos</button>
          </div>
        </div>
        <div class="ofertas-hero">
          <div style="display:flex; justify-content: space-between; margin-bottom:15px;">
            <h2>Ofertas seleccionadas ✨</h2>
            <div class="toggle-vistas">
              <button id="btn-destinos" class="active">Destinos</button>
              <button id="btn-rutas">Rutas</button>
            </div>
          </div>
          <div class="cards-hero" id="cards-hero"></div>
        </div>
      </div>
    </section>
  </main>
  <footer><p>© 2026 Atrapa un Viaje</p></footer>

  <script src="script-cliente.js"></script>
</body>
</html>
