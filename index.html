<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Atrapa un Viaje</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <h1>Atrapa un Viaje ✈️</h1>
  <p>Vuelos baratos y escapadas inolvidables</p>
</header>

<main>

<section class="hero">
  <div class="hero-grid">

    <!-- BUSCADOR PRINCIPAL (Skyscanner) -->
    <div class="buscador">
      <h2>Busca tu vuelo ideal 🌍</h2>
      <div class="search-bar">
        <input type="text" id="origen" placeholder="Origen (ej: Madrid)">
        <input type="text" id="destino" placeholder="Destino (ej: Roma)">
        <input type="number" id="dias" placeholder="Duración (días)">
        <button class="btn" onclick="window.open('https://www.skyscanner.es/','_blank')">Buscar vuelos</button>
      </div>
    </div>

    <div class="separator"></div>

    <!-- OFERTAS DINÁMICAS + MINI BUSCADOR -->
    <div class="ofertas-hero">
      <h2>Ofertas seleccionadas ✨</h2>
      <div class="cards-hero" id="cards-hero">
        <!-- Aquí se generarán las ofertas -->
      </div>

      <!-- MINI BUSCADOR INTERACTIVO -->
      <section class="buscador-interactivo">
        <h3>Filtra tus destinos favoritos 🔎</h3>
        <div class="search-bar-interactivo">
          <input type="text" id="mini-destino" placeholder="Destino (ej: París)">
          <input type="number" id="mini-dias" placeholder="Duración (días)">
          <button class="btn" onclick="buscarMini()">Buscar</button>
        </div>
        <div id="resultados-mini" class="cards-mini">
          <!-- Aquí aparecerán los resultados filtrados -->
        </div>
      </section>

    </div>

  </div>
</section>

</main>

<footer>
  <p>© 2026 Atrapa un Viaje</p>
</footer>

<script>
let destinos = [];

// Cargar destinos desde JSON
fetch('destinos.json')
  .then(res => res.json())
  .then(data => {
    destinos = data;
    mostrarOfertas(destinos); // Mostrar todas las ofertas al inicio
  });

// Mostrar ofertas en la sección principal (hero)
function mostrarOfertas(lista) {
  const container = document.getElementById('cards-hero');
  if(lista.length === 0){
    container.innerHTML = "<p>No se encontraron resultados 😔</p>";
    return;
  }
  container.innerHTML = lista.map(d => `
    <div class="card">
      <h3>${d.nombre}</h3>
      <p><strong>${d.dias} días</strong></p>
      <p>📅 ${d.fechas}</p>
      <p>✈️ ${d.vuelo}€ ida y vuelta</p>
      <p>⏱️ ${d.vuelo_tiempo}</p>
      <p>🏨 <strong>${d.hotel}</strong> ${d.hotel_precio}€</p>

      <!-- Botón de favoritos -->
      <div style="display:flex; align-items:center; gap:8px;">
        <img class="favorito" 
             src="https://images.vexels.com/media/users/3/136916/isolated/lists/aa21eb60437133bf4f4be189636a187a-icono-de-contorno-favorito-de-estrella.png" 
             alt="Favorito" 
             title="Añadir a favoritos"
             style="width:25px; cursor:pointer;" data-fav="false">
        <span class="msg-fav" style="color:#ffd700; font-weight:bold;"></span>
      </div>

      <button class="btn" onclick="window.location='destino.html?slug=${d.slug}'">Ver detalles</button>
    </div>
  `).join('');

  activarFavoritos();
}

// Función del mini-buscador interactivo
function buscarMini() {
  const destinoVal = document.getElementById('mini-destino').value.toLowerCase();
  const diasVal = parseInt(document.getElementById('mini-dias').value);

  const resultados = destinos.filter(d => {
    return d.nombre.toLowerCase().includes(destinoVal) && (!diasVal || d.dias == diasVal);
  });

  const container = document.getElementById('resultados-mini');

  if(resultados.length === 0){
    container.innerHTML = "<p>No se encontraron resultados 😔</p>";
    return;
  }

  container.innerHTML = resultados.map(d => `
    <div class="card">
      <h3>${d.nombre}</h3>
      <p><strong>${d.dias} días</strong></p>
      <p>📅 ${d.fechas}</p>
      <p>✈️ ${d.vuelo}€ ida y vuelta</p>
      <p>⏱️ ${d.vuelo_tiempo}</p>
      <p>🏨 <strong>${d.hotel}</strong> ${d.hotel_precio}€</p>

      <!-- Botón de favoritos -->
      <div style="display:flex; align-items:center; gap:8px;">
        <img class="favorito" 
             src="https://images.vexels.com/media/users/3/136916/isolated/lists/aa21eb60437133bf4f4be189636a187a-icono-de-contorno-favorito-de-estrella.png" 
             alt="Favorito" 
             title="Añadir a favoritos"
             style="width:25px; cursor:pointer;" data-fav="false">
        <span class="msg-fav" style="color:#ffd700; font-weight:bold;"></span>
      </div>

      <button class="btn" onclick="window.location='destino.html?slug=${d.slug}'">Ver detalles</button>
    </div>
  `).join('');

  activarFavoritos();
}

// Función que activa la estrella de favoritos con mensaje de texto
function activarFavoritos(){
  const favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];

  document.querySelectorAll('.favorito').forEach(star => {
    const card = star.closest('.card');
    const slug = card.querySelector('button').getAttribute('onclick').match(/slug=([^']+)/)[1];

    // Si el destino está en favoritos, marcar la estrella amarilla
    if(favoritos.includes(slug)){
      star.src = "https://images.icon-icons.com/1527/PNG/512/star_106651.png";
      star.dataset.fav = "true";
    }

    // Click en la estrella
    star.addEventListener('click', () => {
      let favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];

      if(star.dataset.fav === "true"){
        // Quitar de favoritos
        star.src = "https://images.vexels.com/media/users/3/136916/isolated/lists/aa21eb60437133bf4f4be189636a187a-icono-de-contorno-favorito-de-estrella.png";
        star.dataset.fav = "false";
        favoritos = favoritos.filter(f => f !== slug);
      } else {
        // Añadir a favoritos
        star.src = "https://images.icon-icons.com/1527/PNG/512/star_106651.png";
        star.dataset.fav = "true";
        if(!favoritos.includes(slug)) favoritos.push(slug);
      }

      // Guardar en localStorage
      localStorage.setItem('favoritos', JSON.stringify(favoritos));
    });
  });
}

</script>

</body>
</html>
