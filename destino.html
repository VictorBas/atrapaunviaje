<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Destino - Atrapa un Viaje</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <div class="header-grid">
    <div class="header-title">
      <h1>Atrapa un Viaje ✈️</h1>
      <p>Vuelos baratos y escapadas inolvidables</p>
    </div>
    <div class="header-btn">
      <a href="index.html" class="btn-volver">🏠 Inicio</a>
    </div>
  </div>
</header>

<main>

  <!-- HERO DESTINO -->
  <section id="hero-destino" class="hero-destino">
    <div id="detalle-viaje" class="detalle-viaje-pro">
      <!-- JS -->
    </div>
  </section>

  <!-- ITINERARIO -->
  <section class="itinerario">
    <h2>Itinerario recomendado</h2>
    <div class="dias" id="dias-itinerario"></div>
  </section>

</main>

<footer>
  <p>© 2026 Atrapa un Viaje</p>
</footer>

<script>
let destinoActual;

// =============================
// CARGAR DESTINO
// =============================
fetch('destinos.json')
  .then(res => res.json())
  .then(data => {

    const slug = new URLSearchParams(window.location.search).get('slug');
    destinoActual = data.find(d => d.slug === slug);

    if (!destinoActual) return;

    // HERO IMAGEN
    const hero = document.getElementById('hero-destino');
    hero.style.backgroundImage = `url(${destinoActual.imagen})`;

    // DETALLE VIAJE
    const detalle = document.getElementById('detalle-viaje');
    detalle.innerHTML = `
      <div class="viaje-col">
        <h2>✈️ ${destinoActual.nombre} - ${destinoActual.dias} días</h2>
        <p>📅 Fechas: ${destinoActual.fechas}</p>
        <p>🛫 Vuelo ida y vuelta: ${destinoActual.vuelo}€</p>
        <p>⏱️ Duración aproximada: ${destinoActual.vuelo_tiempo}</p>

        <button class="btn" id="btn-vuelos">
          Reservar vuelo
        </button>
      </div>

      <div class="viaje-col">
        <h2>🏨 Hotel recomendado</h2>
        <p>📍 ${destinoActual.hotel}</p>
        <p>💰 Precio por noche: ${destinoActual.hotel_precio}€</p>
        <p>💡 Tip: Reserva pronto para mejores precios</p>

        <button class="btn-azul" id="btn-hotel">
          Reservar hotel
        </button>
      </div>
    `;

    // ITINERARIO
    const diasIt = document.getElementById('dias-itinerario');
    diasIt.innerHTML = destinoActual.itinerario.map(d => `
      <div class="itinerario-card">
        <h3>${d.dia}</h3>
        <p><strong>🌅 Mañana:</strong> ${d.manana}</p>
        <p><strong>🌇 Tarde:</strong> ${d.tarde}</p>
        <p><strong>🌙 Noche:</strong> ${d.noche}</p>
      </div>
    `).join('');

    // =============================
    // BOTÓN VUELOS
    // =============================
    document.getElementById('btn-vuelos').addEventListener('click', () => {

      const origen = destinoActual.iata_origen;
      const destino = destinoActual.iata_destino;

      let fechaIda = destinoActual.fecha_ida.replace(/-/g, '');
      let fechaVuelta = destinoActual.fecha_vuelta.replace(/-/g, '');

      const url = `https://www.skyscanner.es/transport/flights/${origen}/${destino}/${fechaIda}/${fechaVuelta}/`;

      window.open(url, '_blank');
    });

    // =============================
    // BOTÓN HOTEL (PRO)
    // =============================
    document.getElementById('btn-hotel').addEventListener('click', () => {

      const checkin = destinoActual.fecha_ida;
      const checkout = destinoActual.fecha_vuelta;

      let url;

      if (destinoActual.hotel_link) {

        url = destinoActual.hotel_link;

        if (url.includes('?')) {
          url += `&checkin=${checkin}&checkout=${checkout}&group_adults=2&no_rooms=1`;
        } else {
          url += `?checkin=${checkin}&checkout=${checkout}&group_adults=2&no_rooms=1`;
        }

      } else {

        const busqueda = encodeURIComponent(destinoActual.hotel + " " + destinoActual.nombre);

        url = `https://www.booking.com/searchresults.es.html?ss=${busqueda}&checkin=${checkin}&checkout=${checkout}&group_adults=2&no_rooms=1`;
      }

      window.open(url, '_blank');
    });

  });
</script>

</body>
</html>
